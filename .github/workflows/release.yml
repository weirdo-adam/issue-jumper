name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 2
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Cargo data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Package Unix release
        if: runner.os != 'Windows'
        shell: bash
        run: scripts/package-release.sh --target ${{ matrix.target }} --version "${{ steps.release.outputs.tag }}"

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $target = "${{ matrix.target }}"
          $packageName = "issue-jumper-$tag-$target"
          $packageDir = "dist/$packageName"
          $archive = "dist/$packageName.zip"

          cargo build --release --target $target

          if (Test-Path $packageDir) {
            Remove-Item -Recurse -Force $packageDir
          }
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          Copy-Item "target/$target/release/issue-jumper.exe" "$packageDir/"
          Copy-Item README.md "$packageDir/"
          Copy-Item README.zh-CN.md "$packageDir/"
          Copy-Item LICENSE "$packageDir/"

          if (Test-Path $archive) {
            Remove-Item -Force $archive
          }
          Compress-Archive -Path "$packageDir/*" -DestinationPath $archive

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/issue-jumper-${{ steps.release.outputs.tag }}-${{ matrix.target }}.*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 2
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Resolve Homebrew metadata
        id: metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          echo "homebrew_release_tag=issue-jumper-$version" >> "$GITHUB_OUTPUT"
          echo "source_url=https://github.com/$GH_REPO/archive/refs/tags/$RELEASE_TAG.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish release assets
        id: release_assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          notes_file="$(mktemp)"
          gh api "repos/$GH_REPO/releases/generate-notes" \
            -f tag_name="$tag" \
            -q .body > "$notes_file"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" dist/* --title "$tag" --notes-file "$notes_file"
          fi

      - name: Calculate source checksum
        id: checksum
        shell: bash
        env:
          SOURCE_URL: ${{ steps.metadata.outputs.source_url }}
        run: |
          set -euo pipefail

          curl -fsSL "$SOURCE_URL" -o source.tar.gz
          source_sha256="$(sha256sum source.tar.gz | awk '{print $1}')"
          echo "source_sha256=$source_sha256" >> "$GITHUB_OUTPUT"

      - name: Dispatch Homebrew bottle workflow
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPOSITORY: weirdo-adam/homebrew-tap
          FORMULA: issue-jumper
          RELEASE_TAG: ${{ steps.metadata.outputs.homebrew_release_tag }}
          SOURCE_URL: ${{ steps.metadata.outputs.source_url }}
          SOURCE_SHA256: ${{ steps.checksum.outputs.source_sha256 }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN secret is required to dispatch the Homebrew tap workflow" >&2
            exit 1
          fi

          gh workflow run Bottle \
            --repo "$TAP_REPOSITORY" \
            --ref main \
            -f formula="$FORMULA" \
            -f release_tag="$RELEASE_TAG" \
            -f source_url="$SOURCE_URL" \
            -f source_sha256="$SOURCE_SHA256"
