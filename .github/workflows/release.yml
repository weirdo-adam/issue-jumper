name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 2
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Cargo data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Package Unix release
        if: runner.os != 'Windows'
        shell: bash
        run: scripts/package-release.sh --target ${{ matrix.target }} --version "${{ steps.release.outputs.tag }}"

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $target = "${{ matrix.target }}"
          $packageName = "issue-jumper-$tag-$target"
          $packageDir = "dist/$packageName"
          $archive = "dist/$packageName.zip"

          cargo build --release --target $target

          if (Test-Path $packageDir) {
            Remove-Item -Recurse -Force $packageDir
          }
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          Copy-Item "target/$target/release/issue-jumper.exe" "$packageDir/"
          Copy-Item README.md "$packageDir/"
          Copy-Item README.zh-CN.md "$packageDir/"
          Copy-Item LICENSE "$packageDir/"

          if (Test-Path $archive) {
            Remove-Item -Force $archive
          }
          Compress-Archive -Path "$packageDir/*" -DestinationPath $archive

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/issue-jumper-${{ steps.release.outputs.tag }}-${{ matrix.target }}.*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --title "$tag" --generate-notes
          fi
