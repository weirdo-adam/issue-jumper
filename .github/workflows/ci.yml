name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Cargo data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run quality gate
        shell: bash
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets --all-features -- -D warnings
          bash scripts/check-file-lines.sh
          bash -n scripts/*.sh
          sh -n scripts/install.sh
          cargo test --all-targets

      - name: Run CLI smoke tests
        shell: bash
        run: |
          cargo run -- config lint
          cargo run -- integration print --target generic
